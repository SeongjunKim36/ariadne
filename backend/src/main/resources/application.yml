spring:
  application:
    name: ariadne

  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: ariadne-dev

  datasource:
    url: jdbc:postgresql://localhost:5436/ariadne
    username: ariadne
    password: ariadne-dev

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

aws:
  region: ap-northeast-2

ariadne:
  scan:
    schedule: "0 0 * * * *"  # every hour
  snapshot:
    schedule: "0 5 * * * *"
    retention:
      hourly: 48
      daily: 30
      weekly: 12
      max-storage-gb: 5
  terraform:
    state-path: ${ARIADNE_TERRAFORM_STATE_PATH:}
  eventbridge:
    enabled: false
    queue-url: ${ARIADNE_EVENTBRIDGE_QUEUE_URL:}
    schedule: "0 * * * * *"
    poll-interval-seconds: 60
    max-messages: 5
  notifications:
    slack:
      enabled: false
      webhook-url: ${ARIADNE_SLACK_WEBHOOK_URL:}
  llm:
    api-key: ${CLAUDE_API_KEY:}
    default-model: claude-sonnet-4-6-20250514
    complex-model: claude-opus-4-6-20250610
    transmission-level: strict
    max-input-tokens: 8000
    max-output-tokens: 4096
    daily-budget-usd: 5.0
    timeout-seconds: 30
    retry-max-attempts: 2
    retry-backoff-seconds: 2
  plugins:
    nginx:
      enabled: false
      ssm-timeout-seconds: 30
      config-paths:
        - /etc/nginx/nginx.conf
        - /etc/nginx/conf.d/
